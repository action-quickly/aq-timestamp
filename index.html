<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; background: rgba(30,30,35,0.95); color: #e8e8e8; padding: 20px; height: 100vh; display: flex; flex-direction: column; gap: 16px; }
    h1 { font-size: 18px; }
    .row { display: flex; align-items: center; gap: 12px; }
    label { font-size: 13px; color: #999; width: 80px; flex-shrink: 0; }
    input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 8px 12px; color: #e8e8e8; font-family: "Cascadia Code", monospace; font-size: 13px; outline: none; }
    input:focus { border-color: #4a9eff; }
    button { background: #4a9eff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
    button:hover { background: #3a8ee5; }
    .now { font-size: 24px; font-family: "Cascadia Code", monospace; color: #4a9eff; text-align: center; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    .result { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <h1>时间戳转换</h1>
  <div class="now" id="now"></div>
  <div class="row">
    <label>时间戳</label>
    <input id="ts" placeholder="如 1690000000" />
    <button onclick="tsToDate()">→ 日期</button>
  </div>
  <div class="row">
    <label>日期</label>
    <input id="date" placeholder="如 2024-01-01 12:00:00" />
    <button onclick="dateToTs()">→ 时间戳</button>
  </div>
  <div class="result" id="result"></div>
  <script>
    var ipcId = 0, pending = {};
    function invoke(cmd, args) {
      return new Promise(function(resolve, reject) {
        var id = ++ipcId; pending[id] = { resolve: resolve, reject: reject };
        window.parent.postMessage({ source: "action-quick-plugin", id: id, cmd: cmd, args: args || {} }, "*");
      });
    }
    window.addEventListener("message", function(e) {
      var d = e.data;
      if (!d || d.source !== "action-quick-host") return;
      if (d.type === "aq-init-bridge" && d.script) { try { eval(d.script); } catch(x){} return; }
      if (d.type === "plugin-params" && d.params.contextText) {
        document.getElementById("ts").value = d.params.contextText.trim();
        tsToDate();
      }
      if (d.id && pending[d.id]) { var c = pending[d.id]; delete pending[d.id]; d.error ? c.reject(d.error) : c.resolve(d.result); }
    });

    function updateNow() {
      document.getElementById("now").textContent = Math.floor(Date.now() / 1000);
    }
    setInterval(updateNow, 1000);
    updateNow();

    function tsToDate() {
      try {
        var ts = parseInt(document.getElementById("ts").value);
        if (ts > 1e12) ts = ts / 1000; // 毫秒转秒
        var d = new Date(ts * 1000);
        var str = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
        document.getElementById("date").value = str;
        setResult("");
      } catch(e) { setResult("错误: " + e.message); }
    }

    function dateToTs() {
      try {
        var d = new Date(document.getElementById("date").value);
        if (isNaN(d.getTime())) { setResult("无效日期"); return; }
        document.getElementById("ts").value = Math.floor(d.getTime() / 1000);
        setResult("");
      } catch(e) { setResult("错误: " + e.message); }
    }

    function pad(n) { return n < 10 ? "0" + n : n; }
    function setResult(msg) { document.getElementById("result").textContent = msg; }
  </script>
</body>
</html>
